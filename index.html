<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <style>
        :root {
            box-sizing: border-box;
        }
        *,
        ::before,
        ::after {
            box-sizing: inherit;
            margin: 0;
        }
        main {
            display: flex;
            min-height: 100vh;

            background: linear-gradient(rgba(3,56,244,71), rgba(224,37,206,79));
            border: 1px solid black;
        }
        .section {
            width: 45%;
            margin: .7em auto 0;
            padding: 1.5em;

            background-color: rgba(196, 196, 196, 0.35);
        }
        .header {
            display: flex;
        }
        .header > img {
            width: 150px;
        }
        .footer {
            height: 300px;
            width: 100%;

            border: 1px solid black;
        }
    </style>
</head>
<body>
<main>
    <section class="section">
        <div class="header">
            <img src="images/avatar.png" alt="avatar">
            <div>
                <h3>Kryvenka</h3>
                <h2>Valery</h2>
                <p>Front-end developer</p>
            </div>
        </div>
    </section>
    <section class="section">

    </section>
</main>
<footer class="footer">

</footer>
</body>
</html>
