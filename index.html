<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <style>
        :root {
            box-sizing: border-box;
        }
        *,
        ::before,
        ::after {
            box-sizing: inherit;
            margin: 0;
        }

        main {
            display: flex;
            min-height: 100vh;

            background: linear-gradient(rgba(3,56,244,71), rgba(224,37,206,79));
            border: 1px solid black;
        }
        .section {
            width: 45%;
            margin: 0 auto;
            border: 1px solid black;
        }

        .footer {
            height: 300px;
            width: 100%;

            border: 1px solid black;
        }
    </style>
</head>
<body>
<main>
    <section class="section">

    </section>
    <section class="section">

    </section>
</main>
<footer class="footer">

</footer>
</body>
</html>
