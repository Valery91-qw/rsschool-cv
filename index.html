<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <style>
        :root {
            box-sizing: border-box;
        }

        *,
        ::before,
        ::after {
            box-sizing: inherit;
            margin: 0;
        }

        a {
            color: #FFFFFF;
        }

        main {
            display: flex;
            min-height: 100vh;

            background: linear-gradient(rgba(3, 56, 244, 0.71), rgba(224, 37, 206, 0.79));
            border: 1px solid black;
        }

        /* about-me */
        .about-me {
            width: 45%;
            margin: .7em auto 0;
            padding: 1.5em;

            background-color: rgba(196, 196, 196, 0.35);
            border-radius: 1em;
        }

        .about-me > article {
            display: flex;
            margin: 0.5em;
            width: 100%;
            align-items: center;

            background-color: rgba(196, 196, 196, 0.35);
            border-radius: 1em;
        }

        .about-me article > img {
            margin: 0.5em;
        }

        .about-me article > h3 {
            font-weight: 200;
            font-size: 1.5em;
            color: #FFFFFF;
            margin: 0.3em;
        }

        .about-me article > ul > li {
            margin: 0.3em 0;

            font-size: 1.3em;
            color: #FFFFFF;

            list-style-type: none;
        }

        .about-me article > ul > li:first-child {
            color: #6c6868;
        }

        /* Profile */
        .profile {
            display: flex;
            font-family: Montserat, sans-serif;
            align-items: center;
        }

        .profile > img {
            width: 10em;
        }

        .profile > div {
            margin: 0 2em;
        }

        .profile > div > h3 {
            font-weight: 200;
            font-size: 2em;
            color: #CECACA;
            margin-bottom: 0.75em;
        }

        .profile > div > h2 {
            font-weight: 500;
            font-size: 3em;
            color: #FFFFFF;
            margin-bottom: 0.5em;
        }

        .profile > div > h4 {
            font-weight: 700;
            font-size: 1em;
            color: #CECACA;
        }

        .skills {
            width: 45%;
            margin: .7em auto 0;
            padding: 1.5em;

            background-color: rgb(255, 255, 255);
            border-radius: 1em;
        }

        .footer {
            height: 300px;
            width: 100%;

            border: 1px solid black;
        }

    </style>
</head>
<body>
<main>
    <section class="about-me">
        <div class="profile">
            <img src="images/avatar.png" alt="avatar">
            <div>
                <h3>Kryvenka</h3>
                <h2>Valery</h2>
                <h4>Front-end developer</h4>
            </div>
        </div>
        <article>
            <img src="images/mail.png" alt="mail">
            <h3>vakriv91@gmail.com</h3>
        </article>
        <article>
            <img src="images/phone.png" alt="phone">
            <h3>+375 29 140 46 13</h3>
        </article>
        <article>
            <img src="images/website.png" alt="website">
            <h3><a href="https://github.com/Valery91-qw">git-hub</a></h3>
        </article>
        <article>
            <img src="images/location.png" alt="location">
            <h3>Minsk, Belarus</h3>
        </article>
        <article>
            <h3>Languages:</h3>
            <ul>
                <li>English: pre-intermediate</li>
                <li>Russian: native speaker</li>
            </ul>
        </article>
        <article>
            <h3>Social:</h3>
            <ul>
                <li><a href="https://www.linkedin.com/in/valery-kryveka-486055204/">Linkedin</a></li>
                <li><a href="https://t.me/vaKriv">Telegram</a></li>
            </ul>
        </article>
    </section>
    <section class="skills">

    </section>
</main>
<footer class="footer">

</footer>
</body>
</html>
